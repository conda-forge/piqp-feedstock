{% set name = "piqp" %}
{% set version = "0.6.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/PREDICT-EPFL/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 7109d02ef2895109db06d73a52d80f0ca7be306679c369239d17217d9a9d8a3d

build:
  skip: true  # [win and vc<14]
  number: 2
  run_exports:
    - {{ pin_subpackage(name, max_pin='x.x') }}
  script_env:
    - ISA_TARGET=GENERIC  # [not (x86_64 or aarch64 or arm64)]
    - ISA_TARGET=X64  # [x86_64]
    - ISA_TARGET=ARM64  # [arm64]
    - ISA_TARGET=AARCH64  # [aarch64]

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - clang  # [win]
    - make  # [not win]
    - ninja
    - cmake >=3.12
  host:
    - eigen
    - libblasfeo
    - libmatio
    - python
    - pip
    - scikit-build-core >=0.10.0
    - pybind11
  run:
    - eigen
    - libblasfeo
    - libmatio
    - python
    - numpy
    - scipy

test:
  imports:
    - piqp
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/PREDICT-EPFL/piqp
  doc_url: https://predict-epfl.github.io/piqp/
  summary: A Proximal Interior Point Quadratic Programming solver
  license: BSD-2-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - RSchwan
